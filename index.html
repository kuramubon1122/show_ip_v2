<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>高精度クライアントシグナル収集</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>高精度デバイスシグナル（偽装用）</h2>
    <button id="downloadBtn" disabled>強化版JSONをダウンロード</button>
    <pre id="output">収集処理中...</pre>

    <script>
        async function getBasicSignals() {
            let uaData = null;
            if (navigator.userAgentData) {
                try {
                    // スマホから詳細なClient Hintsを丸ごと引っこ抜く
                    uaData = await navigator.userAgentData.getHighEntropyValues([
                        "architecture", "bitness", "brands", "mobile", "model", "platform", "platformVersion", "fullVersionList"
                    ]);
                } catch(e) {}
            }

            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform || '',
                language: navigator.language || 'ja-JP',
                hardwareConcurrency: Number(navigator.hardwareConcurrency) || 8,
                deviceMemory: Number(navigator.deviceMemory) || 8,
                // ScreenとWindowを完全に分離して収集
                screen: {
                    width: window.screen.width, height: window.screen.height,
                    availWidth: window.screen.availWidth, availHeight: window.screen.availHeight,
                    colorDepth: window.screen.colorDepth || 24, pixelDepth: window.screen.pixelDepth || 24
                },
                window: {
                    innerWidth: window.innerWidth, innerHeight: window.innerHeight,
                    outerWidth: window.outerWidth, outerHeight: window.outerHeight,
                    devicePixelRatio: window.devicePixelRatio || 1
                },
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Tokyo',
                webdriver: navigator.webdriver || false,
                uaData: uaData
            };
        }

        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top'; ctx.font = "14px 'Arial'";
                ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069'; ctx.fillText('Security_Check_#123', 2, 15);
                return canvas.toDataURL(); // 長さではなく画像データそのものを取得
            } catch (e) { return ''; }
        }

        function getWebGLInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
                return debugInfo ? {
                    vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                    renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                } : null;
            } catch (e) { return null; }
        }

        let collectedPayload = null;
        async function init() {
            collectedPayload = {
                timestamp: new Date().toISOString(),
                basic: await getBasicSignals(),
                canvasDataURL: getCanvasFingerprint(), // Canvas画像を保存
                webgl: getWebGLInfo()
            };
            document.getElementById('output').textContent = JSON.stringify(collectedPayload, null, 2);
            document.getElementById('downloadBtn').disabled = false;
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(collectedPayload));
            const a = document.createElement('a');
            a.href = dataStr; a.download = "device_profile_high_precision.json";
            a.click();
        });
        init();
    </script>
</body>
</html>
