<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クライアントシグナル収集・ダウンロード</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h2>取得された端末情報（デバイスシグナル）</h2>
    <button id="downloadBtn" disabled>JSONファイルをダウンロード</button>
    <pre id="output">収集処理中...</pre>

    <script>
        let collectedPayload = null;

        // 1. システムおよびブラウザ基本属性の取得（フォールバック強化版）
        async function getBasicSignals() {
            let ua = navigator.userAgent;
            
            if (navigator.userAgentData) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues([
                        "platform",
                        "platformVersion",
                        "model"
                    ]);
                    
                    if (hints.platform === "Android" && hints.platformVersion) {
                        const majorVersion = hints.platformVersion.split('.')[0];
                        ua = ua.replace(/Android 10/, `Android ${majorVersion}`);
                    }
                    
                    if (hints.model && hints.model !== "") {
                        ua = ua.replace(/; K\)/, `; ${hints.model})`);
                    }
                } catch (e) {
                    // 取得失敗時はデフォルトUAを維持
                }
            }

            // 画面サイズの安全な取得（ブラウザや表示倍率による非互換性を防止）
            const screenW = (window.screen && window.screen.width) ? window.screen.width : (window.innerWidth || 0);
            const screenH = (window.screen && window.screen.height) ? window.screen.height : (window.innerHeight || 0);

            return {
                userAgent: ua,
                platform: navigator.platform || '',
                language: navigator.language || 'ja-JP',
                hardwareConcurrency: Number(navigator.hardwareConcurrency) || 4,
                deviceMemory: Number(navigator.deviceMemory) || 8,
                screenResolution: `${screenW}x${screenH}`,
                colorDepth: window.screen ? (window.screen.colorDepth || 24) : 24,
                devicePixelRatio: window.devicePixelRatio || 1,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Tokyo',
                webdriver: navigator.webdriver || false
            };
        }

        // 2. Canvas APIによるグラフィックス描画指紋の生成
        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                if (!ctx) return '';
                
                ctx.textBaseline = 'top';
                ctx.font = "14px 'Arial'";
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('Security_Check_#123', 2, 15);
                
                return canvas.toDataURL();
            } catch (e) {
                return '';
            }
        }

        // 3. WebGL APIによるGPU情報の取得
        function getWebGLInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return null;

                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (!debugInfo) return null;

                return {
                    vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || '',
                    renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || ''
                };
            } catch (e) {
                return null;
            }
        }

        // データの集約と表示
        async function init() {
            collectedPayload = {
                timestamp: new Date().toISOString(),
                basic: await getBasicSignals(),
                canvasFingerprintLength: getCanvasFingerprint().length,
                webgl: getWebGLInfo()
            };

            document.getElementById('output').textContent = JSON.stringify(collectedPayload, null, 2);
            
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.disabled = false;
        }

        // ダウンロードボタンのクリックイベント
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!collectedPayload) return;
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(collectedPayload, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "device_profile.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        init();
    </script>
</body>
</html>
