<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クライアントシグナル収集デモ</title>
</head>
<body>
    <h2>取得された端末情報（デバイスシグナル）</h2>
    <pre id="output">収集処理中...</pre>

    <script>
        // 1. システムおよびブラウザ基本属性の取得 (Navigator / Screen API)
        function getBasicSignals() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                hardwareConcurrency: navigator.hardwareConcurrency || '非対応/隠蔽', // CPUコア数
                deviceMemory: navigator.deviceMemory || '非対応/隠蔽',             // メモリ(GB)
                screenResolution: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                devicePixelRatio: window.devicePixelRatio || 1,                    // ピクセル比
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                webdriver: navigator.webdriver || false                            // 自動化ツール検知
            };
        }

        // 2. Canvas APIによるグラフィック描画指紋の生成
        function getCanvasFingerprint() {
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            const ctx = canvas.getContext('2d');
            
            ctx.textBaseline = 'top';
            ctx.font = "14px 'Arial'";
            ctx.fillStyle = '#f60';
            ctx.fillRect(125, 1, 62, 20);
            ctx.fillStyle = '#069';
            ctx.fillText('Security_Check_#123', 2, 15);
            
            // 描画結果をBase64テキストデータとして抽出（端末のGPU/フォント描画差が現れる）
            return canvas.toDataURL();
        }

        // 3. WebGL APIによるGPU情報の取得
        function getWebGLInfo() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return null;

            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (!debugInfo) return null;

            return {
                vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),   // GPUベンダー
                renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) // GPUモデル名
            };
        }

        // データの集約と表示
        const collectedPayload = {
            timestamp: new Date().toISOString(),
            basic: getBasicSignals(),
            canvasFingerprintLength: getCanvasFingerprint().length,
            webgl: getWebGLInfo()
        };

        document.getElementById('output').textContent = JSON.stringify(collectedPayload, null, 2);
    </script>
</body>
</html>
